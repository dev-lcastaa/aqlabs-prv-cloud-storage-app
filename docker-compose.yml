services:
  db:
    image: postgres:17-alpine
    container_name: s3mock-db
    environment:
      POSTGRES_DB: s3mock
      POSTGRES_USER: s3mock
      POSTGRES_PASSWORD: s3mock
    volumes:
      - /home/lcastaa/Desktop/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U s3mock -d s3mock"]
      interval: 5s
      timeout: 5s
      retries: 8
    ports:
      - "5432:5432"

  backend:
    build:
      context: ./backend
    container_name: s3mock-backend
    environment:
      APP_NAME: Aqlabs Object Store Command Center API
      API_PREFIX: /api
      DATABASE_URL: postgresql+psycopg://s3mock:s3mock@db:5432/s3mock
      STORAGE_ROOTS: /data/storage01,/data/storage02
      ALLOWED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173,http://s3mock-frontend:5173
      PYTHONPATH: /app
    volumes:
      - /mnt/pidrive01/storage:/data/storage01
      - /mnt/pidrive02/storage:/data/storage02
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    container_name: s3mock-frontend
    environment:
      # Empty base => browser calls relative "/api", which Vite proxies to the backend
      VITE_API_BASE_URL: ""
      VITE_PROXY_TARGET: http://s3mock-backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:5173"
